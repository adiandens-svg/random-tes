<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kicau Mania Chaos</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Arial Black", Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #111, #000);
      overflow: hidden;
      color: #fff;
      user-select: none;
    }

    button#btn {
      position: absolute;
      padding: 14px 28px;
      font-size: 18px;
      font-weight: bold;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: linear-gradient(45deg, #ff3366, #ff9900);
      color: #fff;
      box-shadow: 0 6px 20px rgba(255, 0, 100, 0.6),
                  0 0 0 2px rgba(255, 255, 255, 0.15);
      z-index: 5;
      transition: transform 0.1s ease, box-shadow 0.1s ease;
    }

    button#btn:hover {
      transform: scale(1.15);
      box-shadow: 0 8px 25px rgba(255, 0, 100, 0.8),
                  0 0 0 3px rgba(255, 255, 255, 0.25);
    }

    video {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90vw;
      max-width: 400px;
      border-radius: 16px;
      display: none;
      z-index: 10;
      box-shadow: 0 0 30px rgba(255, 0, 0, 0.7);
      border: 3px solid rgba(255, 255, 255, 0.3);
    }

    .text {
      position: absolute;
      font-size: 30px;
      font-weight: bold;
      color: #ff0066;
      text-shadow:
        0 0 8px #ff0066,
        0 0 16px #ff0066,
        0 0 24px #ff0066,
        0 0 32px #ff4400,
        0 0 50px #ff0000;
      animation: pop 0.8s ease forwards, shake 0.2s infinite;
      pointer-events: none;
      z-index: 20;
      white-space: nowrap;
    }

    @keyframes pop {
      0% {
        transform: scale(0) rotate(-10deg);
        opacity: 0;
      }
      50% {
        transform: scale(2) rotate(10deg);
        opacity: 1;
      }
      100% {
        transform: scale(1) rotate(0);
        opacity: 0;
      }
    }

    @keyframes shake {
      0% { transform: translate(0, 0); }
      25% { transform: translate(2px, -2px) rotate(1deg); }
      50% { transform: translate(-2px, 2px) rotate(-1deg); }
      75% { transform: translate(2px, 2px) rotate(1deg); }
      100% { transform: translate(-2px, -2px) rotate(-1deg); }
    }

    #flash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: white;
      opacity: 0;
      z-index: 50;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #ff4400;
      border-radius: 50%;
      box-shadow: 0 0 8px #ff4400;
      opacity: 0.8;
      pointer-events: none;
      z-index: 15;
    }

    .credit {
      position: fixed;
      bottom: 8px;
      right: 8px;
      font-size: 10px;
      font-family: Arial, sans-serif;
      color: rgba(255, 255, 255, 0.55);
      z-index: 100;
      text-shadow: 0 0 3px #000;
    }
  </style>
</head>
<body>

  <button id="btn">Klik Aku 😏</button>

  <video id="video" src="kicau.mp4" loop></video>
  <audio id="scream" src="teriak.mp3"></audio>
  <div id="flash"></div>
  <div class="credit">Created by: ribiamalia</div>

  <script>
    const btn = document.getElementById('btn');
    const video = document.getElementById('video');
    const scream = document.getElementById('scream');
    const flash = document.getElementById('flash');

    let moveCount = 0;

    // Center button on mobile first
    btn.style.left = '50%';
    btn.style.top = '50%';
    btn.style.transform = 'translate(-50%, -50%)';

    btn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      if (moveCount < 6) {
        moveButton();
        moveCount++;
      }
    });

    btn.addEventListener('click', (e) => {
      e.preventDefault();
      if (moveCount < 6) {
        moveButton();
        moveCount++;
      } else {
        startChaos();
      }
    });

    function moveButton() {
      const x = Math.random() * (window.innerWidth - btn.offsetWidth - 10) + 5;
      const y = Math.random() * (window.innerHeight - btn.offsetHeight - 10) + 5;

      btn.style.transition = 'left 0.2s, top 0.2s';
      btn.style.left = x + 'px';
      btn.style.top = y + 'px';
      btn.style.transform = '';

      btn.style.transform = `translate(${Math.random() * 4 - 2}px, ${Math.random() * 4 - 2}px)`;
      setTimeout(() => {
        btn.style.transform = '';
      }, 100);
    }

    function startChaos() {
      btn.style.display = 'none';

      scream.play();

      flash.style.opacity = '1';
      setTimeout(() => {
        flash.style.opacity = '0';
      }, 200);

      setTimeout(() => {
        video.style.display = 'block';
        video.play();
      }, 500);

      const duration = 30000;
      const interval = setInterval(() => {
        showText();
        createParticle();
      }, 100);

      setTimeout(() => {
        clearInterval(interval);
      }, duration);
    }

    function showText() {
      const text = document.createElement('div');
      text.className = 'text';
      text.innerText = 'KICAU MANIA 🐦🔥';

      text.style.left = Math.random() * window.innerWidth + 'px';
      text.style.top = Math.random() * window.innerHeight + 'px';

      if (Math.random() > 0.5) {
        text.style.color = '#ff6600';
        text.style.textShadow = '0 0 8px #ff6600, 0 0 16px #ff6600, 0 0 24px #ff0000';
      } else {
        text.style.color = '#cc00ff';
        text.style.textShadow = '0 0 8px #cc00ff, 0 0 16px #cc00ff, 0 0 24px #ff00ff';
      }

      document.body.appendChild(text);

      setTimeout(() => {
        text.remove();
      }, 800);
    }

    function createParticle() {
      const p = document.createElement('div');
      p.className = 'particle';

      const x = Math.random() * window.innerWidth;
      const y = Math.random() * 150 + 30;

      p.style.left = x + 'px';
      p.style.top = y + 'px';

      document.body.appendChild(p);

      let vy = 1.5 + Math.random() * 2.5;
      let vx = (Math.random() - 0.5) * 4;
      let opacity = 0.8;

      const animate = () => {
        const top = parseFloat(p.style.top);
        const left = parseFloat(p.style.left);

        if (top > window.innerHeight || opacity < 0) {
          p.remove();
          return;
        }

        opacity -= 0.01;
        p.style.top = (top + vy) + 'px';
        p.style.left = (left + vx) + 'px';
        p.style.opacity = opacity;

        vy += 0.08;
        requestAnimationFrame(animate);
      };

      requestAnimationFrame(animate);
    }
  </script>
</body>
</html>
