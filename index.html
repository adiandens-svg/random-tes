<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>Kicau Mania Chaos</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Arial Black", Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100dvh;
      background: linear-gradient(135deg, #111, #000);
      overflow: hidden;
      color: #fff;
    }

    button#btn {
      position: absolute;
      padding: 14px 26px;
      font-size: 18px;
      font-weight: bold;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      background: linear-gradient(45deg, #ff3366, #ff9900);
      color: #fff;
      box-shadow: 0 8px 25px rgba(255, 0, 100, 0.6),
                  0 0 0 3px rgba(255, 255, 255, 0.15);
      z-index: 5;
      transition: transform 0.1s ease, box-shadow 0.1s ease;
      touch-action: manipulation;
      min-width: 120px;
      min-height: 48px;
    }

    button#btn:hover {
      transform: scale(1.1);
      box-shadow: 0 12px 30px rgba(255, 0, 100, 0.8),
                  0 0 0 5px rgba(255, 255, 255, 0.25);
    }

    video {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: min(90vw, 600px);
      border-radius: 18px;
      display: none;
      z-index: 10;
      box-shadow: 0 0 40px rgba(255, 0, 0, 0.7);
      border: 4px solid rgba(255, 255, 255, 0.3);
    }

    .text {
      position: absolute;
      font-size: 40px;
      font-weight: bold;
      color: #ff0066;
      text-shadow:
        0 0 10px #ff0066,
        0 0 20px #ff0066,
        0 0 30px #ff0066,
        0 0 40px #ff4400,
        0 0 70px #ff0000;
      animation: pop 0.8s ease forwards, shake 0.2s infinite;
      pointer-events: none;
      z-index: 20;
      white-space: nowrap;
    }

    @keyframes pop {
      0% { transform: scale(0) rotate(-10deg); opacity: 0; }
      50% { transform: scale(2) rotate(10deg); opacity: 1; }
      100% { transform: scale(1) rotate(0); opacity: 0; }
    }

    @keyframes shake {
      0% { transform: translate(0, 0); }
      25% { transform: translate(2px, -2px) rotate(1deg); }
      50% { transform: translate(-2px, 2px) rotate(-1deg); }
      75% { transform: translate(2px, 2px) rotate(1deg); }
      100% { transform: translate(-2px, -2px) rotate(-1deg); }
    }

    #flash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: white;
      opacity: 0;
      z-index: 50;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .particle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: #ff4400;
      border-radius: 50%;
      box-shadow: 0 0 10px #ff4400;
      opacity: 0.8;
      pointer-events: none;
      z-index: 15;
    }

    .credit {
      position: fixed;
      bottom: 10px;
      right: 10px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
      z-index: 100;
    }

    /* MOBILE FIX */
    @media (max-width: 600px) {
      .text {
        font-size: 22px;
      }

      button#btn {
        font-size: 16px;
        padding: 12px 20px;
      }
    }
  </style>
</head>
<body>

  <button id="btn">Klik Aku 😏</button>

  <video id="video" src="kicau.mp4" loop></video>
  <audio id="scream" src="teriak.mp3"></audio>
  <div id="flash"></div>
  <div class="credit">Created by: ribiamalia</div>

  <script>
    const btn = document.getElementById('btn');
    const video = document.getElementById('video');
    const scream = document.getElementById('scream');
    const flash = document.getElementById('flash');

    let moveCount = 0;

    // Munculkan tombol di tengah dulu
    btn.style.left = '50%';
    btn.style.top = '50%';
    btn.style.transform = 'translate(-50%, -50%)';

    btn.addEventListener('mouseover', () => {
      if (moveCount < 6) {
        moveButton();
        moveCount++;
      }
    });

    btn.addEventListener('click', (e) => {
      e.preventDefault();
      if (moveCount < 6) {
        moveButton();
        moveCount++;
      } else {
        startChaos();
      }
    });

    function moveButton() {
      const x = Math.random() * (window.innerWidth - btn.offsetWidth - 20) + 10;
      const y = Math.random() * (window.innerHeight - btn.offsetHeight - 20) + 10;

      btn.style.transition = 'left 0.2s, top 0.2s';
      btn.style.left = x + 'px';
      btn.style.top = y + 'px';
      btn.style.transform = '';

      // vibrate sedikit ke random arah
      btn.style.transform = `translate(${Math.random() * 4 - 2}px, ${Math.random() * 4 - 2}px)`;
      setTimeout(() => {
        btn.style.transform = '';
      }, 100);
    }

    function startChaos() {
      btn.style.display = 'none';

      // Teriakan
      scream.play();

      // Flash putih kilatan
      flash.style.opacity = '1';
      setTimeout(() => {
        flash.style.opacity = '0';
      }, 200);

      // Delay sedikit, lalu tampilkan video
      setTimeout(() => {
        video.style.display = 'block';
        video.play();
      }, 500);

      // Teks berjatuhan selama 30 detik
      const duration = 30000;
      const interval = setInterval(() => {
        showText();
        createParticle(); // efek api kecil
      }, 100);

      setTimeout(() => {
        clearInterval(interval);
      }, duration);
    }

    function showText() {
      const text = document.createElement('div');
      text.className = 'text';
      text.innerText = 'KICAU MANIA 🐦🔥';

      text.style.left = Math.random() * window.innerWidth + 'px';
      text.style.top = Math.random() * window.innerHeight + 'px';

      // acak warna dan rotasi
      if (Math.random() > 0.5) {
        text.style.color = '#ff6600';
        text.style.textShadow = '0 0 10px #ff6600, 0 0 20px #ff6600, 0 0 30px #ff0000';
      } else {
        text.style.color = '#cc00ff';
        text.style.textShadow = '0 0 10px #cc00ff, 0 0 20px #cc00ff, 0 0 30px #ff00ff';
      }

      document.body.appendChild(text);

      setTimeout(() => {
        text.remove();
      }, 800);
    }

    function createParticle() {
      const p = document.createElement('div');
      p.className = 'particle';

      const x = Math.random() * window.innerWidth;
      const y = Math.random() * 200 + 50; // dari atas

      p.style.left = x + 'px';
      p.style.top = y + 'px';

      // gerak jatuh dan hilang
      document.body.appendChild(p);

      let vy = 2 + Math.random() * 3;
      let vx = (Math.random() - 0.5) * 6;
      let opacity = 0.8;

      const animate = () => {
        const top = parseFloat(p.style.top);
        const left = parseFloat(p.style.left);

        if (top > window.innerHeight || opacity < 0) {
          p.remove();
          return;
        }

        opacity -= 0.01;
        p.style.top = (top + vy) + 'px';
        p.style.left = (left + vx) + 'px';
        p.style.opacity = opacity;

        vy += 0.1;
        requestAnimationFrame(animate);
      };

      requestAnimationFrame(animate);
    }
  </script>
</body>
</html>
